<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book Appointment</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet"/>

  <!-- Shared Styles -->
  <link rel="stylesheet" href="css/style.css"/>

  <style>
    /* ── Page-specific layout ── */
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 500px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .header .badge-label { margin-bottom: 1rem; display: inline-block; }
    .header p {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-top: 0.6rem;
    }

    /* Dashboard link */
    .dashboard-link {
      text-align: center;
      margin-top: 1.5rem;
    }
    .dashboard-link a {
      color: var(--muted);
      font-size: 0.88rem;
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1px;
      transition: color 0.2s;
    }
    .dashboard-link a:hover { color: var(--accent); }
  </style>
</head>
<body>

  <div class="container">

    <!-- Header -->
    <div class="header anim-1">
      <span class="badge-label">Appointment System</span>
      <h1>Book Your Appointment</h1>
      <p>Fill in the details below and we'll send you a WhatsApp confirmation instantly.</p>
    </div>

    <!-- Form Card -->
    <div class="card anim-2">
      <form id="appointmentForm">

        <div class="form-group">
          <label for="name">Customer Name</label>
          <input type="text" id="name" placeholder="e.g. Khushal Patil" required />
        </div>

        <div class="form-group">
          <label for="phone">WhatsApp Number</label>
          <input type="tel" id="phone" placeholder="e.g. +919876543210" required />
          <p class="hint">Include country code — e.g. +91 for India</p>
        </div>

        <div class="form-group">
          <label for="datetime">Appointment Date &amp; Time</label>
          <input type="datetime-local" id="datetime" required />
        </div>

        <button type="submit" class="btn-primary" id="submitBtn">
          <span class="btn-text">Book Appointment</span>
          <div class="spinner"></div>
        </button>

      </form>
    </div>

    <!-- Link to Dashboard -->
    <div class="dashboard-link anim-3">
      <a href="dashboard.html">View all appointments →</a>
    </div>

  </div>

  <!-- Toast notification -->
  <div id="toast"></div>

  <!-- Form Logic -->
  <script src="js/app.js"></script>

</body>
</html>
